<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign UP-Bookora</title>
</head>
<body>
    <header>
        <h1>Bookora</h1>
         <nav>
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="form-section">
            <h2>Create Your Account</h2>
            <p>Join thousands of book lovers on BookHive</p>
            <form class="signup-form">

<div class="form-group">

<label for="fullname">

Full Name

</label>

<input
type="text"
id="fullname"
required>

</div>

<div class="form-group">

<label for="email">

Email

</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label for="phone">

Phone Number

</label>

<input
type="tel"
id="phone">

</div>

<div class="form-group">

<label for="city">

City

</label>

<select id="city">

<option>Select City</option>

<option>Hyderabad</option>

<option>Bengaluru</option>

<option>Delhi</option>

<option>Mumbai</option>

<option>Chennai</option>

</select>

</div>

<div class="form-group">

<label for="dob">

Date of Birth

</label>

<input
type="date"
id="dob">

</div>

<div class="form-group">

<label for="password">

Password

</label>

<input
type="password"
id="password"
required>

</div>

<div class="form-group">

<label for="confirm">

Confirm Password

</label>

<input
type="password"
id="confirm"
required>

</div>

<div class="form-group">

<p>

Favorite Categories

</p>

<label>

<input type="checkbox">

Programming

</label>

<label>

<input type="checkbox">

Finance

</label>

<label>

<input type="checkbox">

Self Growth

</label>

<label>

<input type="checkbox">

Fiction

</label>

</div>

<div class="form-group checkbox-group">

<input
type="checkbox"
required>

<label>

I agree to the Terms & Conditions

</label>

</div>

<div class="form-group checkbox-group">

<input
type="checkbox">

<label>

Subscribe to Newsletter

</label>

</div>

<button
type="submit"
class="btn-primary">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Bookora. all rights reserved.</p>
    </footer>
</body>
</html>
