<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Bookora</title>
</head>
<body>
    <header>
        <h1>Bookora</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
        </header>
        <main>
            <section class="form-section">
                <h2>Welcome Back!</h2>
                <p>Login to your Bookora account</p>
               <form class="login-form">

<div class="form-group">

<label for="email">

Email Address

</label>

<input
type="email"
id="email"
placeholder="you@example.com"
required>

</div>

<div class="form-group">

<label for="password">

Password

</label>

<input
type="password"
id="password"
placeholder="Enter password"
required>

</div>

<div class="form-group checkbox-group">

<input
type="checkbox"
id="remember">

<label for="remember">

Remember Me

</label>

</div>

<button
type="submit"
class="btn-primary">

Login

</button>

<p>

<a href="#">

Forgot Password?

</a>

</p>

<p>

Don't have an account?

<a href="signup.html">

Create One

</a>

</p>

</form>
            </section>
            
        </main>
        <footer>
            <p>&copy , 2026 Bookora.All rights reserved.</p>
        </footer>
    
</body>
</html>
